<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Viewer</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg0: #0d1117;
      --bg1: #161b22;
      --bg2: #21262d;
      --bg3: #30363d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #484f58;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --orange: #e3b341;
      --purple: #bc8cff;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg0);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .header-spacer { flex: 1; }
    .ws-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .ws-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .ws-dot.error { background: var(--red); }
    .ws-dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 200px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg1);
      flex-shrink: 0;
    }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-tab {
      flex: 1;
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      text-align: center;
    }
    .sidebar-tab:hover { color: var(--text); }
    .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .sidebar-filters {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex-shrink: 0;
    }
    .filter-chip {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-track { background: transparent; }
    .session-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

    .session-item {
      padding: 8px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .session-item:hover { background: var(--bg2); }
    .session-item.selected { background: var(--bg2); border-left-color: var(--accent); }
    .session-item-id {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item-meta {
      display: flex;
      gap: 6px;
      margin-top: 3px;
      align-items: center;
    }
    .badge {
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      line-height: 1.4;
    }
    .badge-input    { background: #1f3d2e; color: #3fb950; }
    .badge-heuristic { background: #2d1f3d; color: #bc8cff; }
    .badge-output   { background: #2d2a1f; color: #e3b341; }
    .badge-working  { background: #1f2d3d; color: #79c0ff; }
    .badge-requests { background: #3d1f1f; color: #f87171; }
    .badge-dispatcher { background: #1f2d2d; color: #67e8f9; }
    .badge-session  { background: #2d1f2d; color: #f0abfc; }
    .badge-invocation { background: #2d2a1f; color: #fcd34d; }
    .badge-worker   { background: #1f2d2d; color: #6ee7b7; }
    .badge-pending  { background: #3d2b1f; color: var(--orange); }
    .badge-active   { background: #1f3420; color: var(--green); }
    .badge-complete { background: #1f2d3d; color: var(--accent); }
    .badge-live     { background: #3d1f20; color: var(--red); }
    .badge-type     { background: var(--bg3); color: var(--text-muted); }

    .session-item-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* Detail Panel */
    .detail-panel {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .detail-meta {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg1);
    }
    .detail-meta-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .detail-meta-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
      font-family: var(--font-mono);
    }
    .detail-meta-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .detail-meta-path {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-top: 4px;
      word-break: break-all;
    }
    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-thumb { background: var(--bg3); }
    .file-item {
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.1s;
      border-left: 2px solid transparent;
    }
    .file-item:hover { background: var(--bg2); }
    .file-item.selected { background: var(--bg2); border-left-color: var(--accent); }
    .file-icon { font-size: 12px; flex-shrink: 0; }
    .file-name {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-size {
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .file-item.updated { animation: flash 1s ease-out; }
    @keyframes flash {
      0% { background: rgba(88, 166, 255, 0.2); }
      100% { background: transparent; }
    }

    /* Content Viewer */
    .content-viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .content-toolbar {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg1);
      flex-shrink: 0;
    }
    .content-filename {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text);
    }
    .content-body {
      flex: 1;
      overflow: auto;
      padding: 12px 16px;
      background: var(--bg0);
    }
    .content-body::-webkit-scrollbar { width: 6px; height: 6px; }
    .content-body::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    .content-pre {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--text-dim);
    }
    .empty-state-icon { font-size: 32px; opacity: 0.5; }
    .empty-state-text { font-size: 13px; }

    /* JSON syntax highlighting */
    .json-key    { color: #79c0ff; }
    .json-string { color: #a5d6ff; }
    .json-number { color: #f2cc60; }
    .json-bool   { color: #ff7b72; }
    .json-null   { color: #ff7b72; }

    /* Live Feed */
    .live-feed {
      border-top: 1px solid var(--border);
      background: var(--bg1);
      flex-shrink: 0;
      transition: height 0.2s;
    }
    .live-feed-header {
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
    }
    .live-feed.expanded .live-feed-header {
      border-bottom-color: var(--border);
    }
    .live-feed-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .live-badge {
      padding: 1px 5px;
      border-radius: 10px;
      font-size: 10px;
      background: var(--red);
      color: white;
      animation: pulse 2s infinite;
    }
    .live-feed-toggle { margin-left: auto; color: var(--text-dim); font-size: 10px; }
    .event-scroll {
      height: 120px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .event-scroll::-webkit-scrollbar { width: 4px; }
    .event-scroll::-webkit-scrollbar-thumb { background: var(--bg3); }
    .event-row {
      padding: 2px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
    .event-time { color: var(--text-dim); flex-shrink: 0; width: 68px; }
    .event-op {
      flex-shrink: 0;
      width: 48px;
      font-weight: 500;
    }
    .op-create { color: var(--green); }
    .op-write  { color: var(--accent); }
    .op-remove { color: var(--red); }
    .op-rename { color: var(--orange); }
    .event-path { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Refresh button */
    .btn {
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .btn:hover { background: var(--bg3); color: var(--text); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ── Utilities ─────────────────────────────────────────────────────────────

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return `${Math.floor(diff)}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return d.toLocaleDateString();
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return `${bytes}B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)}K`;
      return `${(bytes / 1024 / 1024).toFixed(1)}M`;
    }

    function fileIcon(name) {
      if (name.endsWith('.json')) return '{}';
      if (name.endsWith('.md'))   return '📝';
      if (name.endsWith('.txt'))  return '📄';
      if (name.endsWith('.tf'))   return '🔧';
      if (name.endsWith('.sh'))   return '⚙';
      if (name.endsWith('.log'))  return '📋';
      return '·';
    }

    function categoryBadgeClass(cat) {
      const map = {
        input: 'badge-input', heuristic: 'badge-heuristic', output: 'badge-output',
        working: 'badge-working', requests: 'badge-requests', dispatcher: 'badge-dispatcher',
        session: 'badge-session', invocation: 'badge-invocation', worker: 'badge-worker',
      };
      return map[cat] || 'badge-type';
    }

    function statusBadgeClass(status) {
      const map = {
        pending: 'badge-pending', active: 'badge-active', complete: 'badge-complete', live: 'badge-live',
        processed: 'badge-complete', session: 'badge-session',
      };
      return map[status] || 'badge-type';
    }

    // ── JSON Renderer ─────────────────────────────────────────────────────────

    function JsonValue({ val }) {
      if (val === null) return <span className="json-null">null</span>;
      if (typeof val === 'boolean') return <span className="json-bool">{String(val)}</span>;
      if (typeof val === 'number') return <span className="json-number">{val}</span>;
      if (typeof val === 'string') return <span className="json-string">"{val}"</span>;
      if (Array.isArray(val)) {
        if (val.length === 0) return <span>[]</span>;
        return (
          <span>
            {'[\n'}
            {val.map((v, i) => (
              <span key={i}>
                {'  '}<JsonValue val={v} />{i < val.length - 1 ? ',' : ''}{'\n'}
              </span>
            ))}
            {']'}
          </span>
        );
      }
      if (typeof val === 'object') {
        const keys = Object.keys(val);
        if (keys.length === 0) return <span>{'{}'}</span>;
        return (
          <span>
            {'{\n'}
            {keys.map((k, i) => (
              <span key={k}>
                {'  '}<span className="json-key">"{k}"</span>{': '}<JsonValue val={val[k]} />{i < keys.length - 1 ? ',' : ''}{'\n'}
              </span>
            ))}
            {'}'}
          </span>
        );
      }
      return <span>{String(val)}</span>;
    }

    function FileContentView({ filename, content }) {
      if (!content) return null;

      if (filename && filename.endsWith('.json')) {
        try {
          const parsed = JSON.parse(content);
          return (
            <pre className="content-pre">
              <JsonValue val={parsed} />
            </pre>
          );
        } catch {
          // fall through to plain text
        }
      }
      return <pre className="content-pre">{content}</pre>;
    }

    // ── Components ────────────────────────────────────────────────────────────

    function Header({ wsStatus, onRefresh }) {
      return (
        <div className="header">
          <span className="header-title">Agent Viewer</span>
          <span className="header-subtitle">/workspaces/slopspaces</span>
          <div className="header-spacer" />
          <button className="btn" onClick={onRefresh}>↺ Refresh</button>
          <div className="ws-indicator">
            <div className={`ws-dot ${wsStatus}`} />
            <span>{wsStatus === 'connected' ? 'Live' : wsStatus === 'connecting' ? 'Connecting' : 'Offline'}</span>
          </div>
        </div>
      );
    }

    const CATEGORIES = ['input', 'heuristic', 'output', 'working', 'requests', 'dispatcher'];
    const RECORD_KINDS = ['invocation', 'session', 'worker'];

    function SessionSidebar({ sessions, selected, onSelect, updatedPaths }) {
      const [filter, setFilter] = useState(null);

      const filtered = useMemo(() => {
        if (!filter) return sessions;
        return sessions.filter(s => s.category === filter);
      }, [sessions, filter]);

      const categoryCounts = useMemo(() => {
        const counts = {};
        sessions.forEach(s => { counts[s.category] = (counts[s.category] || 0) + 1; });
        return counts;
      }, [sessions]);

      return (
        <>
          <div className="sidebar-filters">
            <button
              className={`filter-chip ${!filter ? 'active' : ''}`}
              onClick={() => setFilter(null)}
            >
              All ({sessions.length})
            </button>
            {CATEGORIES.filter(c => categoryCounts[c]).map(c => (
              <button
                key={c}
                className={`filter-chip ${filter === c ? 'active' : ''}`}
                onClick={() => setFilter(filter === c ? null : c)}
              >
                {c} ({categoryCounts[c]})
              </button>
            ))}
          </div>
          <div className="session-list">
            {filtered.map(s => {
              const isUpdated = updatedPaths.some(p => p.includes(s.id));
              return (
                <div
                  key={`${s.category}:${s.id}`}
                  className={`session-item ${selected?.id === s.id ? 'selected' : ''} ${isUpdated ? 'updated' : ''}`}
                  onClick={() => onSelect(s)}
                >
                  <div className="session-item-id">{s.id}</div>
                  <div className="session-item-meta">
                    <span className={`badge ${categoryBadgeClass(s.category)}`}>{s.category}</span>
                    {s.status && <span className={`badge ${statusBadgeClass(s.status)}`}>{s.status}</span>}
                    {s.type && s.type !== 'unknown' && <span className="badge badge-type">{s.type}</span>}
                    <span className="session-item-time">{fmtTime(s.modified)}</span>
                  </div>
                </div>
              );
            })}
            {filtered.length === 0 && (
              <div style={{ padding: '20px 12px', color: 'var(--text-dim)', fontSize: 12 }}>
                No sessions found
              </div>
            )}
          </div>
        </>
      );
    }

    function RecordSidebar({ records, selected, onSelect }) {
      const [filter, setFilter] = useState(null);

      const filtered = useMemo(() => {
        if (!filter) return records;
        return records.filter(r => r.kind === filter);
      }, [records, filter]);

      const kindCounts = useMemo(() => {
        const counts = {};
        records.forEach(r => { counts[r.kind] = (counts[r.kind] || 0) + 1; });
        return counts;
      }, [records]);

      return (
        <>
          <div className="sidebar-filters">
            <button
              className={`filter-chip ${!filter ? 'active' : ''}`}
              onClick={() => setFilter(null)}
            >
              All ({records.length})
            </button>
            {RECORD_KINDS.filter(k => kindCounts[k]).map(k => (
              <button
                key={k}
                className={`filter-chip ${filter === k ? 'active' : ''}`}
                onClick={() => setFilter(filter === k ? null : k)}
              >
                {k} ({kindCounts[k]})
              </button>
            ))}
          </div>
          <div className="session-list">
            {filtered.map(r => (
              <div
                key={r.id}
                className={`session-item ${selected?.id === r.id ? 'selected' : ''}`}
                onClick={() => onSelect(r)}
              >
                <div className="session-item-id">{r.id.replace('worker/', '')}</div>
                <div className="session-item-meta">
                  <span className={`badge ${categoryBadgeClass(r.kind)}`}>{r.kind}</span>
                  <span className="session-item-time">{fmtTime(r.modified)}</span>
                </div>
              </div>
            ))}
          </div>
        </>
      );
    }

    function DetailPanel({ selected, tab, updatedPaths }) {
      const [selectedFile, setSelectedFile] = useState(null);
      const [fileContent, setFileContent] = useState(null);
      const [loading, setLoading] = useState(false);

      // Reset file selection when session changes
      useEffect(() => {
        setSelectedFile(null);
        setFileContent(null);
      }, [selected?.id]);

      // Auto-select DISPATCH.json or INSTRUCTION.json if present
      useEffect(() => {
        if (!selected || selectedFile) return;
        const files = selected.files || [];
        const preferred = files.find(f =>
          ['DISPATCH.json', 'INSTRUCTION.json', 'HEURISTIC.md', 'metadata.txt'].includes(f.name)
        );
        if (preferred) loadFile(preferred);
      }, [selected]);

      // Reload current file if it was updated
      useEffect(() => {
        if (!selectedFile || !updatedPaths.length) return;
        if (updatedPaths.some(p => p.includes(selectedFile.name))) {
          loadFile(selectedFile);
        }
      }, [updatedPaths]);

      const loadFile = useCallback(async (file) => {
        setSelectedFile(file);
        setLoading(true);
        try {
          const res = await fetch(`/api/file?path=${encodeURIComponent(file.path)}`);
          if (res.ok) {
            setFileContent(await res.text());
          } else {
            setFileContent(`Error: ${res.status} ${res.statusText}`);
          }
        } catch (e) {
          setFileContent(`Error: ${e.message}`);
        } finally {
          setLoading(false);
        }
      }, []);

      if (!selected) {
        return (
          <div className="detail-panel">
            <div className="empty-state" style={{ flex: 1 }}>
              <div className="empty-state-icon">◈</div>
              <div className="empty-state-text">Select a {tab === 'sessions' ? 'session' : 'record'} to inspect</div>
            </div>
          </div>
        );
      }

      const files = selected.files || [];
      const isUpdated = f => updatedPaths.some(p => p.includes(f.name));

      return (
        <div className="detail-panel">
          <div className="detail-meta">
            <div className="detail-meta-header">
              <div className="detail-meta-title">{selected.id}</div>
              <div className="detail-meta-badges">
                {selected.category && (
                  <span className={`badge ${categoryBadgeClass(selected.category)}`}>{selected.category}</span>
                )}
                {selected.kind && (
                  <span className={`badge ${categoryBadgeClass(selected.kind)}`}>{selected.kind}</span>
                )}
                {selected.status && (
                  <span className={`badge ${statusBadgeClass(selected.status)}`}>{selected.status}</span>
                )}
                {selected.type && selected.type !== 'unknown' && (
                  <span className="badge badge-type">{selected.type}</span>
                )}
              </div>
              <div className="detail-meta-path">{selected.path}</div>
            </div>
            <div className="file-list">
              {files.length === 0 && (
                <div style={{ padding: '12px', color: 'var(--text-dim)', fontSize: 11 }}>No files</div>
              )}
              {files.map(f => (
                <div
                  key={f.path}
                  className={`file-item ${selectedFile?.path === f.path ? 'selected' : ''} ${isUpdated(f) ? 'updated' : ''}`}
                  onClick={() => loadFile(f)}
                >
                  <span className="file-icon">{fileIcon(f.name)}</span>
                  <span className="file-name">{f.name}</span>
                  <span className="file-size">{fmtSize(f.size)}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="content-viewer">
            {selectedFile ? (
              <>
                <div className="content-toolbar">
                  <span className="file-icon">{fileIcon(selectedFile.name)}</span>
                  <span className="content-filename">{selectedFile.name}</span>
                  <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-dim)' }}>
                    {fmtSize(selectedFile.size)} · {fmtTime(selectedFile.modified)}
                  </span>
                </div>
                <div className="content-body">
                  {loading ? (
                    <div style={{ color: 'var(--text-dim)', fontFamily: 'var(--font-mono)', fontSize: 12 }}>
                      Loading…
                    </div>
                  ) : (
                    <FileContentView filename={selectedFile.name} content={fileContent} />
                  )}
                </div>
              </>
            ) : (
              <div className="empty-state">
                <div className="empty-state-icon">📂</div>
                <div className="empty-state-text">Select a file to view its contents</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function LiveFeed({ events }) {
      const [expanded, setExpanded] = useState(true);
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current && expanded) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [events, expanded]);

      return (
        <div className={`live-feed ${expanded ? 'expanded' : ''}`}>
          <div className="live-feed-header" onClick={() => setExpanded(e => !e)}>
            <span className="live-feed-title">Live Events</span>
            {events.length > 0 && <span className="live-badge">{Math.min(events.length, 99)}</span>}
            <span className="live-feed-toggle">{expanded ? '▼' : '▲'}</span>
          </div>
          {expanded && (
            <div className="event-scroll" ref={scrollRef}>
              {events.length === 0 && (
                <div style={{ padding: '8px 12px', color: 'var(--text-dim)', fontSize: 11, fontFamily: 'var(--font-mono)' }}>
                  Waiting for file system events…
                </div>
              )}
              {events.map((ev, i) => (
                <div key={i} className="event-row">
                  <span className="event-time">{ev.displayTime}</span>
                  <span className={`event-op op-${ev.op}`}>{ev.op}</span>
                  <span className="event-path">{ev.path}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const [sessions, setSessions] = useState([]);
      const [records, setRecords] = useState([]);
      const [selected, setSelected] = useState(null);
      const [tab, setTab] = useState('sessions');
      const [wsStatus, setWsStatus] = useState('connecting');
      const [events, setEvents] = useState([]);
      const [updatedPaths, setUpdatedPaths] = useState([]);
      const wsRef = useRef(null);
      const reconnectRef = useRef(null);

      const fetchSessions = useCallback(async () => {
        try {
          const res = await fetch('/api/sessions');
          if (res.ok) setSessions(await res.json());
        } catch {}
      }, []);

      const fetchRecords = useCallback(async () => {
        try {
          const res = await fetch('/api/records');
          if (res.ok) setRecords(await res.json());
        } catch {}
      }, []);

      const connectWS = useCallback(() => {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${proto}//${location.host}/ws`);
        wsRef.current = ws;

        ws.onopen = () => {
          setWsStatus('connected');
          if (reconnectRef.current) {
            clearTimeout(reconnectRef.current);
            reconnectRef.current = null;
          }
        };

        ws.onmessage = (e) => {
          try {
            const ev = JSON.parse(e.data);
            if (ev.type === 'file_event') {
              const displayTime = new Date(ev.time || Date.now()).toLocaleTimeString();
              setEvents(prev => [...prev.slice(-199), { ...ev, displayTime }]);
              setUpdatedPaths(prev => {
                const next = [...prev, ev.path];
                setTimeout(() => setUpdatedPaths(p => p.filter(x => x !== ev.path)), 2000);
                return next;
              });
              // Refresh data on significant events
              if (ev.op === 'create' || ev.op === 'remove') {
                fetchSessions();
                fetchRecords();
              }
            }
          } catch {}
        };

        ws.onerror = () => setWsStatus('error');
        ws.onclose = () => {
          setWsStatus('connecting');
          reconnectRef.current = setTimeout(connectWS, 3000);
        };
      }, [fetchSessions, fetchRecords]);

      useEffect(() => {
        fetchSessions();
        fetchRecords();
        connectWS();
        return () => {
          wsRef.current?.close();
          if (reconnectRef.current) clearTimeout(reconnectRef.current);
        };
      }, []);

      const handleRefresh = useCallback(() => {
        fetchSessions();
        fetchRecords();
      }, [fetchSessions, fetchRecords]);

      const currentItems = tab === 'sessions' ? sessions : records;
      const selectedItem = tab === 'sessions'
        ? sessions.find(s => s.id === selected?.id && s.category === selected?.category)
        : records.find(r => r.id === selected?.id);

      return (
        <>
          <Header wsStatus={wsStatus} onRefresh={handleRefresh} />
          <div className="layout">
            <div className="sidebar">
              <div className="sidebar-tabs">
                <button
                  className={`sidebar-tab ${tab === 'sessions' ? 'active' : ''}`}
                  onClick={() => { setTab('sessions'); setSelected(null); }}
                >
                  Sessions ({sessions.length})
                </button>
                <button
                  className={`sidebar-tab ${tab === 'records' ? 'active' : ''}`}
                  onClick={() => { setTab('records'); setSelected(null); }}
                >
                  Records ({records.length})
                </button>
              </div>
              {tab === 'sessions' ? (
                <SessionSidebar
                  sessions={sessions}
                  selected={selected}
                  onSelect={setSelected}
                  updatedPaths={updatedPaths}
                />
              ) : (
                <RecordSidebar
                  records={records}
                  selected={selected}
                  onSelect={setSelected}
                />
              )}
            </div>
            <DetailPanel
              selected={selectedItem}
              tab={tab}
              updatedPaths={updatedPaths}
            />
          </div>
          <LiveFeed events={events} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
